<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1150">
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
    <marker id="arr-pink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#db2777"/></marker>
    <marker id="arr-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8"/></marker>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="110%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>
  <style>text{font-family:"Helvetica Neue",Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif}.t{font-size:18px;font-weight:600;fill:#111827}.lb{font-size:13px;font-weight:600;fill:#111827}.ln{font-size:13px;fill:#111827}.lnw{font-size:13px;fill:#fff;font-weight:600}.s{font-size:10px;fill:#6b7280}.sw{font-size:10px;fill:#fff;font-weight:600}.sg{font-size:10px;fill:#9ca3af}</style>
  <rect width="960" height="1150" fill="#fff"/>
  <text x="480" y="30" text-anchor="middle" class="t">完整工作流：从自然语言到交付 + 指标监控</text>
  <text x="480" y="50" text-anchor="middle" class="s">10 Skills · 链式执行 · 方案审核(可选门禁) · PMO(独立触发) · ACM 自动采集指标</text>
<rect x="50" y="78" width="60" height="22" rx="11" fill="#2563eb"/>
<text x="80" y="93" text-anchor="middle" class="sw">Phase 1</text>
<text x="120" y="93" class="lb">自然语言匹配 + 分诊路由</text>
<rect x="320" y="70" width="580" height="40" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" filter="url(#sh)"/>
<text x="610.0" y="92" text-anchor="middle" class="ln" fill="#111827">用户: "帮我设计一个用户中心"</text>
<text x="610.0" y="114" text-anchor="middle" class="s" fill="">→ harness-entry 分诊 → 匹配 harness-brainstorming</text>
<path d="M 610.0 112 L 610.0 133" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
<rect x="50" y="168" width="60" height="22" rx="11" fill="#ea580c"/>
<text x="80" y="183" text-anchor="middle" class="sw">Phase 2</text>
<text x="120" y="183" class="lb">方案设计 (brainstorming)</text>
<rect x="320" y="160" width="580" height="82" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1" filter="url(#sh)"/>
<text x="610.0" y="182" text-anchor="middle" class="s" fill="">探索项目现状 → 逐条提问 → 提出 2-3 方案 → 分节展示设计</text>
<text x="610.0" y="204" text-anchor="middle" class="s" fill="">设计写入 spec → 七大思维/CRARE 自检(PRD) → 用户审阅确认</text>
<text x="610.0" y="226" text-anchor="middle" class="s" fill="">📢 Step 8 四选一: 审核方案 / 生成文档 / 直接编码 / 暂不继续</text>
<path d="M 550.0 242 L 550.0 248" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
<path d="M 550.0 248 L 230 248 L 230 278" stroke="#db2777" stroke-width="1.5" fill="none" marker-end="url(#arr-pink)"/>
<rect x="240" y="263" width="100" height="15" rx="3" fill="#fff" opacity="0.95"/>
<text x="290.0" y="274" text-anchor="middle" class="s" fill="#db2777" font-weight="600">可选: 审核方案 →</text>
<rect x="50" y="283" width="60" height="22" rx="11" fill="#db2777"/>
<text x="80" y="298" text-anchor="middle" class="sw">Phase 2.5</text>
<text x="120" y="298" class="lb">方案审核 (design-review) — 可选门禁</text>
<rect x="320" y="275" width="380" height="54" rx="6" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1" filter="url(#sh)"/>
<text x="510.0" y="297" text-anchor="middle" class="s" fill="">四检查面: 范围完整性 / 内部一致性 / 可行性 / 风险覆盖</text>
<text x="510.0" y="319" text-anchor="middle" class="s" fill="">审核循环 → 阻断问题修订 → 直到零阻断 → 用户确认放行</text>
<path d="M 510 333 L 510 361" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
<path d="M 670.0 248 L 960 248 L 960 373" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-blue)"/>
<rect x="940" y="263" width="92" height="15" rx="3" fill="#fff" opacity="0.95"/>
<text x="986.0" y="274" text-anchor="middle" class="s" fill="#2563eb">← 直接编码 (跳过)</text>
<rect x="50" y="378" width="60" height="22" rx="11" fill="#16a34a"/>
<text x="80" y="393" text-anchor="middle" class="sw">Phase 3a</text>
<text x="120" y="393" class="lb">文档生成 (document-generation)</text>
<rect x="320" y="370" width="380" height="52" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1" filter="url(#sh)"/>
<text x="510.0" y="392" text-anchor="middle" class="s" fill="">Read 模板 → 逐节匹配 → Mermaid 图表渲染 → MD 草稿</text>
<text x="510.0" y="414" text-anchor="middle" class="s" fill="">用户审阅 → doc-pipeline.sh 转 DOCX → 📢 "后续是否需要编码？"</text>
<path d="M 510 426 L 510 442" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
<path d="M 960 373 L 960 444 L 900 444" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-blue)"/>
<rect x="50" y="459" width="60" height="22" rx="11" fill="#9333ea"/>
<text x="80" y="474" text-anchor="middle" class="sw">Phase 4</text>
<text x="120" y="474" class="lb">编码实现 (implementation)</text>
<rect x="320" y="451" width="580" height="52" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1" filter="url(#sh)"/>
<text x="610.0" y="473" text-anchor="middle" class="s" fill="">技术栈自动检测 → 加载编码规范 → TDD: RED → GREEN → REFACTOR</text>
<text x="610.0" y="495" text-anchor="middle" class="s" fill="">编码完成 → 📢 列出测试文件 → 询问是否执行测试</text>
<path d="M 610.0 507 L 610.0 523" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
<rect x="50" y="539" width="60" height="22" rx="11" fill="#9333ea"/>
<text x="80" y="554" text-anchor="middle" class="sw">Phase 5</text>
<text x="120" y="554" class="lb">测试 (testing)</text>
<rect x="320" y="531" width="580" height="52" rx="6" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1" filter="url(#sh)"/>
<text x="610.0" y="553" text-anchor="middle" class="s" fill="">Path A: 后端单测 (mock+coverage≥80%) | Path B: E2E (webapp-testing+Playwright MCP)</text>
<text x="610.0" y="575" text-anchor="middle" class="s" fill="">📢 全部通过 → 展示改动概要 → 询问是否压测 → Path C: 压测</text>
<path d="M 610.0 587 L 610.0 603" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
<rect x="50" y="619" width="60" height="22" rx="11" fill="#ea580c"/>
<text x="80" y="634" text-anchor="middle" class="sw">Phase 6</text>
<text x="120" y="634" class="lb">代码审查 (code-review)</text>
<rect x="320" y="611" width="580" height="52" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1" filter="url(#sh)"/>
<text x="610.0" y="633" text-anchor="middle" class="s" fill="">Phase 0: 改动展示 → Phase 1: 计划评审 → Phase 2: 代码/安全评审 → Phase 3: 测试评审</text>
<text x="610.0" y="655" text-anchor="middle" class="s" fill="">输出评审结论 → 📢 询问是否提交 → git commit (触发 ACM) → Push → 可选 PR</text>
<path d="M 610.0 667 L 610.0 683" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
<rect x="470.0" y="699" width="280" height="36" rx="18" fill="#16a34a" filter="url(#sh)"/>
<text x="610.0" y="723" text-anchor="middle" class="lnw">✅ 交付：设计文档 + 代码 + 测试报告</text>
<rect x="915" y="464" width="100" height="22" rx="11" fill="#38bdf8"/>
<text x="965" y="479" text-anchor="middle" class="sw">PMO 独立触发</text>
<text x="965" y="500" class="s" fill="#38bdf8" font-weight="600">"拆任务/排期/里程碑"</text>
<rect x="910" y="506" width="110" height="110" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1" filter="url(#sh)"/>
<text x="965.0" y="528" text-anchor="middle" class="s" fill="">harness-pmo</text>
<text x="965.0" y="550" text-anchor="middle" class="s" fill="">里程碑 M1-M4</text>
<text x="965.0" y="572" text-anchor="middle" class="s" fill="">→ 史诗 E1-E3</text>
<text x="965.0" y="594" text-anchor="middle" class="s" fill="">→ 用户故事 P0-P2</text>
<text x="965.0" y="616" text-anchor="middle" class="s" fill="">→ 任务(仅P0)</text>
<rect x="915" y="198" width="90" height="22" rx="11" fill="#ea580c"/>
<text x="960" y="213" text-anchor="middle" class="sw">Debug 独立</text>
<text x="960" y="232" class="s" fill="#ea580c" font-weight="600">"修bug/报错"</text>
<rect x="910" y="238" width="100" height="28" rx="6" fill="#fef2f2" stroke="#f87171" stroke-width="1"/>
<text x="960" y="256" text-anchor="middle" class="s" font-weight="600">systematic-debugging</text>
<rect x="30" y="754" width="900" height="58" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="50" y="776" class="lb">📊 ACM Agent — 静默后台运行</text>
<rect x="280" y="759" width="200" height="24" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
<text x="380" y="775" text-anchor="middle" class="s">git commit → post-commit hook 触发</text>
<rect x="500" y="759" width="200" height="24" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
<text x="600" y="775" text-anchor="middle" class="s">Python agent 分析 diff → AI 代码占比</text>
<rect x="720" y="759" width="190" height="24" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
<text x="815" y="775" text-anchor="middle" class="s">上报 ACM Server → 指标面板</text>
<text x="50" y="800" class="s">零手动操作 · 安装即生效 · 按项目/语言/时段统计 AI 辅助效能</text>
<rect x="30" y="829" width="900" height="52" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="50" y="851" class="lb">🔴 知识沉淀 — 全流程触发（不可静默跳过）</text>
<rect x="280" y="834" width="170" height="24" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
<text x="365" y="850" text-anchor="middle" class="s">修复错误后 (debug/code/...)</text>
<rect x="465" y="834" width="180" height="24" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
<text x="555" y="850" text-anchor="middle" class="s">方案设计决策 (brainstorming)</text>
<rect x="660" y="834" width="170" height="24" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
<text x="745" y="850" text-anchor="middle" class="s">踩坑记录 (用户耗时表达)</text>
<text x="50" y="873" class="s">AI 必须问，用户可以说不沉淀，但 AI 不能不问 · 判重 + 分级路由 + knowledge-index.yaml</text>
<rect x="30" y="897" width="900" height="48" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<line x1="100" y1="906" x2="120" y2="906" stroke="#2563eb" stroke-width="2"/>
<text x="125" y="910" class="s">主流程 (Phase 1-7)</text>
<line x1="310" y1="906" x2="330" y2="906" stroke="#16a34a" stroke-width="2"/>
<text x="335" y="910" class="s">文档生成 (推荐路径)</text>
<line x1="520" y1="906" x2="540" y2="906" stroke="#db2777" stroke-width="2"/>
<text x="545" y="910" class="s">方案审核 (可选门禁)</text>
<line x1="730" y1="906" x2="750" y2="906" stroke="#9333ea" stroke-width="2"/>
<text x="755" y="910" class="s">编码+测试</text>
<line x1="100" y1="923" x2="120" y2="923" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,3"/>
<text x="125" y="927" class="s">直接编码 (跳过文档/审核)</text>
<line x1="310" y1="923" x2="330" y2="923" stroke="#ea580c" stroke-width="2"/>
<text x="335" y="927" class="s">调试 (独立触发)</text>
<line x1="520" y1="923" x2="540" y2="923" stroke="#38bdf8" stroke-width="2"/>
<text x="545" y="927" class="s">PMO (独立触发)</text>
<text x="50" y="941" class="s" fill="#9ca3af">推荐路径: 设计 → (可选:审核) → 文档 → 编码 → 测试 → 评审 → 提交。PMO/Debug 随时可独立触发。</text>
</svg>