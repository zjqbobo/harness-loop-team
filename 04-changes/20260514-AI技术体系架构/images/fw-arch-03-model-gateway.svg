<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="108%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.06"/></filter>
  </defs>
  <style>text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }</style>
  <rect width="960" height="680" fill="#ffffff"/>
  <text x="480" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">模型网关架构 (Model Gateway)</text>

  <!-- Top: Agent/App -->
  <rect x="380" y="45" width="200" height="34" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="480" y="67" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Agent / Application</text>
  <line x1="480" y1="79" x2="480" y2="100" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Model Gateway - center -->
  <rect x="280" y="105" width="400" height="50" rx="8" fill="#fef2f2" stroke="#f87171" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#b91c1c">Model Gateway</text>
  <text x="480" y="144" text-anchor="middle" font-size="10" fill="#6b7280">POST /v1/chat (OpenAI API 兼容)</text>

  <!-- Left: Control Plane -->
  <rect x="30" y="105" width="200" height="120" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="30" y="105" width="200" height="22" rx="6" fill="#6b7280"/>
  <rect x="30" y="115" width="200" height="12" fill="#6b7280"/>
  <text x="130" y="121" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Control Plane</text>
  <text x="50" y="140" font-size="10" fill="#374151">模型注册 · 配额管理</text>
  <text x="50" y="155" font-size="10" fill="#374151">供应商管理 · 成本追踪</text>
  <text x="50" y="170" font-size="10" fill="#374151">Fallback 策略 · 路由规则</text>
  <text x="50" y="190" font-size="10" fill="#6b7280">声明式 YAML + Admin UI</text>

  <!-- Right: Data Plane -->
  <rect x="730" y="105" width="200" height="120" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="730" y="105" width="200" height="22" rx="6" fill="#6b7280"/>
  <rect x="730" y="115" width="200" height="12" fill="#6b7280"/>
  <text x="830" y="121" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Data Plane</text>
  <text x="750" y="140" font-size="10" fill="#374151">请求路由 · 负载均衡</text>
  <text x="750" y="155" font-size="10" fill="#374151">限流熔断 · 响应缓存</text>
  <text x="750" y="170" font-size="10" fill="#374151">协议转换 · 审计日志</text>

  <!-- Arrows from Gateway down -->
  <line x1="360" y1="155" x2="360" y2="195" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="480" y1="155" x2="480" y2="195" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="600" y1="155" x2="600" y2="195" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Model Providers row -->
  <text x="480" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">模型供应商 (Adapter 模式接入)</text>

  <rect x="50" y="230" width="140" height="65" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <rect x="50" y="230" width="140" height="20" rx="6" fill="#2563eb"/>
  <rect x="50" y="240" width="140" height="10" fill="#2563eb"/>
  <text x="120" y="246" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">外部 LLM</text>
  <text x="120" y="265" text-anchor="middle" font-size="9" fill="#374151">OpenAI</text>
  <text x="120" y="278" text-anchor="middle" font-size="9" fill="#374151">Anthropic</text>
  <text x="120" y="291" text-anchor="middle" font-size="9" fill="#374151">DeepSeek</text>

  <rect x="220" y="230" width="140" height="65" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <rect x="220" y="230" width="140" height="20" rx="6" fill="#16a34a"/>
  <rect x="220" y="240" width="140" height="10" fill="#16a34a"/>
  <text x="290" y="246" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">国内模型</text>
  <text x="290" y="265" text-anchor="middle" font-size="9" fill="#374151">通义千问</text>
  <text x="290" y="278" text-anchor="middle" font-size="9" fill="#374151">文心一言</text>
  <text x="290" y="291" text-anchor="middle" font-size="9" fill="#374151">智谱 GLM</text>

  <rect x="390" y="230" width="180" height="65" rx="6" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <rect x="390" y="230" width="180" height="20" rx="6" fill="#7c3aed"/>
  <rect x="390" y="240" width="180" height="10" fill="#7c3aed"/>
  <text x="480" y="246" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">私有模型</text>
  <text x="480" y="265" text-anchor="middle" font-size="9" fill="#374151">vLLM · TGI · TensorRT</text>
  <text x="480" y="278" text-anchor="middle" font-size="9" fill="#374151">GPU Pool 自建推理</text>

  <rect x="600" y="230" width="140" height="65" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <rect x="600" y="230" width="140" height="20" rx="6" fill="#ea580c"/>
  <rect x="600" y="240" width="140" height="10" fill="#ea580c"/>
  <text x="670" y="246" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">国产芯片模型</text>
  <text x="670" y="265" text-anchor="middle" font-size="9" fill="#374151">昇腾</text>
  <text x="670" y="278" text-anchor="middle" font-size="9" fill="#374151">寒武纪</text>

  <!-- Connect Gateway to providers -->
  <path d="M 360 195 L 360 215 L 120 215 L 120 225" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 480 195 L 480 225" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 600 195 L 600 215 L 670 215 L 670 225" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- Fallback Chain (bottom) -->
  <text x="480" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Fallback 链</text>

  <rect x="100" y="330" width="140" height="32" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="170" y="351" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">主模型调用</text>
  <line x1="240" y1="346" x2="270" y2="346" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="280" y="330" width="140" height="32" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="350" y="351" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">同供应商重试</text>
  <text x="355" y="323" text-anchor="middle" font-size="8" fill="#6b7280">(1次, backoff 1s)</text>
  <line x1="420" y1="346" x2="450" y2="346" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="460" y="330" width="140" height="32" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="530" y="351" text-anchor="middle" font-size="10" font-weight="600" fill="#b91c1c">备选模型切换</text>
  <text x="535" y="323" text-anchor="middle" font-size="8" fill="#6b7280">(Claude→DeepSeek)</text>
  <line x1="600" y1="346" x2="630" y2="346" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="640" y="330" width="130" height="32" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="705" y="351" text-anchor="middle" font-size="10" font-weight="600" fill="#c2410c">降级模型</text>
  <text x="710" y="323" text-anchor="middle" font-size="8" fill="#6b7280">(轻量+标记degraded)</text>
  <line x1="770" y1="346" x2="800" y2="346" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="810" y="330" width="110" height="32" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="865" y="351" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">友好错误+告警</text>

  <!-- Semantic Cache section -->
  <text x="480" y="390" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">语义缓存 (Semantic Cache)</text>
  <rect x="230" y="400" width="500" height="28" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="480" y="419" text-anchor="middle" font-size="10" fill="#374151">精确匹配 (5%) → 语义相似 >0.95 → 语义相似 >0.85 → 调用 LLM (命中率 20-35%)</text>

  <!-- Key design decisions section -->
  <text x="480" y="455" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">关键设计决策</text>

  <rect x="30" y="465" width="210" height="55" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="135" y="483" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">API 协议</text>
  <text x="135" y="498" text-anchor="middle" font-size="9" fill="#6b7280">OpenAI API 兼容</text>
  <text x="135" y="511" text-anchor="middle" font-size="9" fill="#6b7280">生态兼容性最强</text>

  <rect x="255" y="465" width="210" height="55" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="360" y="483" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">模型注册</text>
  <text x="360" y="498" text-anchor="middle" font-size="9" fill="#6b7280">声明式 YAML + Admin UI</text>
  <text x="360" y="511" text-anchor="middle" font-size="9" fill="#6b7280">新模型不改代码</text>

  <rect x="480" y="465" width="210" height="55" rx="6" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="585" y="483" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">缓存策略</text>
  <text x="585" y="498" text-anchor="middle" font-size="9" fill="#6b7280">语义缓存 (非精确匹配)</text>
  <text x="585" y="511" text-anchor="middle" font-size="9" fill="#6b7280">命中率提升20-30%</text>

  <rect x="705" y="465" width="225" height="55" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="817" y="483" text-anchor="middle" font-size="10" font-weight="600" fill="#c2410c">限流策略</text>
  <text x="817" y="498" text-anchor="middle" font-size="9" fill="#6b7280">Token Bucket</text>
  <text x="817" y="511" text-anchor="middle" font-size="9" fill="#6b7280">租户+模型双维度</text>

</svg>