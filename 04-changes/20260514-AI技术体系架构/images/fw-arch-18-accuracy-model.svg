<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="108%"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <style>text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }</style>
  <rect width="960" height="520" fill="#ffffff"/>
  <text x="480" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Agent 执行准确率五维模型</text>

  <!-- P1 -->
  <rect x="30" y="50" width="170" height="180" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="50" width="170" height="28" rx="8" fill="#2563eb"/>
  <rect x="30" y="65" width="170" height="13" fill="#2563eb"/>
  <text x="115" y="70" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">P1: 意图识别</text>
  <text x="115" y="108" text-anchor="middle" font-size="10" fill="#374151">分类是否正确</text>
  <text x="115" y="128" text-anchor="middle" font-size="10" fill="#374151">槽位提取是否完整</text>
  <rect x="55" y="148" width="120" height="28" rx="14" fill="#2563eb"/>
  <text x="115" y="167" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">目标 ≥95%</text>
  <text x="115" y="206" text-anchor="middle" font-size="9" fill="#6b7280">LLM-as-Judge+人工抽检</text>

  <!-- P2 -->
  <rect x="210" y="50" width="170" height="180" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="210" y="50" width="170" height="28" rx="8" fill="#16a34a"/>
  <rect x="210" y="65" width="170" height="13" fill="#16a34a"/>
  <text x="295" y="70" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">P2: 知识检索</text>
  <text x="295" y="108" text-anchor="middle" font-size="10" fill="#374151">Top-K是否有相关文档</text>
  <text x="295" y="128" text-anchor="middle" font-size="10" fill="#374151">排序是否合理</text>
  <rect x="235" y="148" width="120" height="28" rx="14" fill="#16a34a"/>
  <text x="295" y="167" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">目标 ≥90%</text>
  <text x="295" y="206" text-anchor="middle" font-size="9" fill="#6b7280">金标数据集Recall@5</text>

  <!-- P3 -->
  <rect x="390" y="50" width="170" height="180" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="390" y="50" width="170" height="28" rx="8" fill="#7c3aed"/>
  <rect x="390" y="65" width="170" height="13" fill="#7c3aed"/>
  <text x="475" y="70" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">P3: Skill调用</text>
  <text x="475" y="108" text-anchor="middle" font-size="10" fill="#374151">选择的Skill是否正确</text>
  <text x="475" y="128" text-anchor="middle" font-size="10" fill="#374151">参数是否正确</text>
  <rect x="415" y="148" width="120" height="28" rx="14" fill="#7c3aed"/>
  <text x="475" y="167" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">目标 ≥92%</text>
  <text x="475" y="206" text-anchor="middle" font-size="9" fill="#6b7280">Schema校验+人工抽检</text>

  <!-- P4 -->
  <rect x="570" y="50" width="170" height="180" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="570" y="50" width="170" height="28" rx="8" fill="#ea580c"/>
  <rect x="570" y="65" width="170" height="13" fill="#ea580c"/>
  <text x="655" y="70" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">P4: 推理质量</text>
  <text x="655" y="108" text-anchor="middle" font-size="10" fill="#374151">多步推理是否逻辑正确</text>
  <text x="655" y="128" text-anchor="middle" font-size="10" fill="#374151">结论是否可靠</text>
  <rect x="595" y="148" width="120" height="28" rx="14" fill="#ea580c"/>
  <text x="655" y="167" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">目标 ≥85%</text>
  <text x="655" y="206" text-anchor="middle" font-size="9" fill="#6b7280">LLM-as-Judge+用户反馈</text>

  <!-- P5 -->
  <rect x="750" y="50" width="170" height="180" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="750" y="50" width="170" height="28" rx="8" fill="#dc2626"/>
  <rect x="750" y="65" width="170" height="13" fill="#dc2626"/>
  <text x="835" y="70" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">P5: 端到端</text>
  <text x="835" y="108" text-anchor="middle" font-size="10" fill="#374151">任务是否达成</text>
  <text x="835" y="128" text-anchor="middle" font-size="10" fill="#374151">是否需人工介入</text>
  <rect x="775" y="148" width="120" height="28" rx="14" fill="#dc2626"/>
  <text x="835" y="167" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">目标 ≥80%</text>
  <text x="835" y="206" text-anchor="middle" font-size="9" fill="#6b7280">任务成功率</text>

  <!-- Centered composite -->
  <rect x="300" y="260" width="360" height="40" rx="20" fill="#1e293b" filter="url(#shadow)"/>
  <text x="480" y="286" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">综合准确率目标 ≥ 88%</text>

  <!-- 90-day timeline -->
  <text x="480" y="335" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">90天提升路径</text>

  <!-- Timeline bar -->
  <rect x="60" y="350" width="840" height="24" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="60" y="350" width="140" height="24" rx="12" fill="#dbeafe"/>
  <text x="130" y="366" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">W1-2: 基线</text>

  <rect x="210" y="350" width="140" height="24" rx="12" fill="#bbf7d0"/>
  <text x="280" y="366" text-anchor="middle" font-size="9" font-weight="600" fill="#15803d">W3-4: Prompt</text>

  <rect x="360" y="350" width="140" height="24" rx="12" fill="#ddd6fe"/>
  <text x="430" y="366" text-anchor="middle" font-size="9" font-weight="600" fill="#7c3aed">W5-6: RAG</text>

  <rect x="510" y="350" width="140" height="24" rx="12" fill="#fed7aa"/>
  <text x="580" y="366" text-anchor="middle" font-size="9" font-weight="600" fill="#c2410c">W7-8: Skill</text>

  <rect x="660" y="350" width="140" height="24" rx="12" fill="#fecaca"/>
  <text x="730" y="366" text-anchor="middle" font-size="9" font-weight="600" fill="#b91c1c">W9-10: E2E</text>

  <rect x="810" y="350" width="90" height="24" rx="12" fill="#e2e8f0"/>
  <text x="855" y="366" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">W11-12</text>

  <!-- Score trajectory -->
  <text x="480" y="412" text-anchor="middle" font-size="11" font-weight="600" fill="#111827">五维度 Score 提升轨迹</text>

  <rect x="60" y="425" width="840" height="30" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="100" y="445" font-size="9" font-weight="600" fill="#374151">P1: 0.88</text><text x="170" y="445" font-size="9" fill="#2563eb">→0.92→0.94→</text><text x="260" y="445" font-size="10" font-weight="600" fill="#16a34a">0.96</text>
  <text x="330" y="445" font-size="9" font-weight="600" fill="#374151">P2: 0.70</text><text x="400" y="445" font-size="9" fill="#2563eb">→0.80→0.87→</text><text x="490" y="445" font-size="10" font-weight="600" fill="#16a34a">0.91</text>
  <text x="550" y="445" font-size="9" font-weight="600" fill="#374151">P3: 0.78</text><text x="620" y="445" font-size="9" fill="#2563eb">→0.84→0.90→</text><text x="710" y="445" font-size="10" font-weight="600" fill="#16a34a">0.93</text>

  <rect x="60" y="460" width="840" height="24" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="100" y="477" font-size="9" fill="#374151">P4: 0.72→0.78→0.83→</text><text x="260" y="477" font-size="10" font-weight="600" fill="#16a34a">0.87</text>
  <text x="330" y="477" font-size="9" fill="#374151">P5: 0.65→0.72→0.78→</text><text x="490" y="477" font-size="10" font-weight="600" fill="#16a34a">0.83</text>
  <text x="570" y="477" font-size="9" font-weight="600" fill="#374151">综合: 0.75→0.81→0.86→</text><text x="760" y="477" font-size="11" font-weight="600" fill="#15803d">0.90</text>

</svg>