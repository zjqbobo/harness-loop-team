<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="108%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.06"/></filter>
  </defs>
  <style>text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }</style>
  <rect width="960" height="220" fill="#ffffff"/>
  <text x="480" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">AI 安全护栏 (Guardrails) — 五层安全防护</text>

  <!-- Layer 1: Infra -->
  <rect x="20" y="40" width="180" height="45" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="20" y="40" width="180" height="20" rx="8" fill="#6b7280"/>
  <rect x="20" y="50" width="180" height="10" fill="#6b7280"/>
  <text x="110" y="55" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">L1: 基础设施安全</text>
  <text x="110" y="76" text-anchor="middle" font-size="9" fill="#374151">镜像扫描 · 漏洞管理 · IDS</text>

  <!-- Layer 2: Network -->
  <rect x="210" y="40" width="180" height="45" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="210" y="40" width="180" height="20" rx="8" fill="#2563eb"/>
  <rect x="210" y="50" width="180" height="10" fill="#2563eb"/>
  <text x="300" y="55" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">L2: 网络安全</text>
  <text x="300" y="76" text-anchor="middle" font-size="9" fill="#1d4ed8">WAF · DDoS · VPC 隔离</text>

  <!-- Layer 3: App -->
  <rect x="400" y="40" width="180" height="45" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="400" y="40" width="180" height="20" rx="8" fill="#16a34a"/>
  <rect x="400" y="50" width="180" height="10" fill="#16a34a"/>
  <text x="490" y="55" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">L3: 应用安全</text>
  <text x="490" y="76" text-anchor="middle" font-size="9" fill="#15803d">OAuth/OIDC · RBAC · SSO</text>

  <!-- Layer 4: AI -->
  <rect x="590" y="40" width="180" height="45" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="590" y="40" width="180" height="20" rx="8" fill="#dc2626"/>
  <rect x="590" y="50" width="180" height="10" fill="#dc2626"/>
  <text x="680" y="55" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">L4: AI 安全</text>
  <text x="680" y="76" text-anchor="middle" font-size="9" fill="#b91c1c">Prompt Injection · Jailbreak</text>

  <!-- Layer 5: Data -->
  <rect x="780" y="40" width="160" height="45" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="780" y="40" width="160" height="20" rx="8" fill="#7c3aed"/>
  <rect x="780" y="50" width="160" height="10" fill="#7c3aed"/>
  <text x="860" y="55" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">L5: 数据安全</text>
  <text x="860" y="76" text-anchor="middle" font-size="9" fill="#7c3aed">TLS1.3 · AES256 · PII</text>

  <!-- Guardrails flow -->
  <text x="480" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#111827">AI 安全护栏 (Guardrails) 执行流程</text>

  <rect x="30" y="122" width="160" height="36" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="110" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">用户输入</text>

  <rect x="220" y="122" width="300" height="36" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="370" y="140" text-anchor="middle" font-size="9" font-weight="600" fill="#b91c1c">输入安全检测</text>
  <text x="370" y="153" text-anchor="middle" font-size="8" fill="#6b7280">Prompt Injection · Jailbreak · PII · 恶意意图</text>

  <rect x="550" y="122" width="120" height="36" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="610" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">Agent 执行</text>

  <rect x="700" y="122" width="220" height="36" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="810" y="140" text-anchor="middle" font-size="9" font-weight="600" fill="#b91c1c">输出安全检测</text>
  <text x="810" y="153" text-anchor="middle" font-size="8" fill="#6b7280">有害内容 · 幻觉检测 · 敏感信息 · 合规</text>

  <!-- Arrows -->
  <line x1="190" y1="140" x2="216" y2="140" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Check result boxes at bottom -->
  <text x="480" y="185" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">输出检测维度: 准确性 (正确率/引用准确率) · 安全性 (有害内容率/越狱成功率) · 效率 (平均步数/Token消耗) · 一致性</text>

</svg>