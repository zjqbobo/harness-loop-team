<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="108%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.06"/></filter>
  </defs>
  <style>text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }</style>
  <rect width="960" height="480" fill="#ffffff"/>
  <text x="480" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">分层记忆系统 (Memory System)</text>

  <!-- Working Memory (top) -->
  <rect x="100" y="40" width="760" height="60" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="100" y="40" width="760" height="22" rx="8" fill="#2563eb"/>
  <rect x="100" y="50" width="760" height="12" fill="#2563eb"/>
  <text x="480" y="56" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Working Memory (工作记忆)</text>
  <text x="120" y="78" font-size="9" fill="#374151">存储: 当前对话上下文 (Context Window)</text>
  <text x="500" y="78" font-size="9" fill="#374151">管理: 滑动窗口 + 自动摘要压缩</text>
  <text x="750" y="78" font-size="9" fill="#6b7280">受模型 Context Window 限制</text>

  <line x1="480" y1="100" x2="480" y2="120" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Short-term Memory -->
  <rect x="100" y="125" width="760" height="60" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="100" y="125" width="760" height="22" rx="8" fill="#16a34a"/>
  <rect x="100" y="135" width="760" height="12" fill="#16a34a"/>
  <text x="480" y="141" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Short-Term Memory (短期记忆)</text>
  <text x="120" y="163" font-size="9" fill="#374151">存储引擎: Redis Cluster</text>
  <text x="500" y="163" font-size="9" fill="#374151">内容: 当前会话历史 · 最近 N 轮对话</text>
  <text x="750" y="163" font-size="9" fill="#6b7280">生命周期: 会话级 (TTL 24h)</text>

  <line x1="480" y1="185" x2="480" y2="205" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Long-term Memory -->
  <rect x="100" y="210" width="760" height="60" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="100" y="210" width="760" height="22" rx="8" fill="#7c3aed"/>
  <rect x="100" y="220" width="760" height="12" fill="#7c3aed"/>
  <text x="480" y="226" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Long-Term Memory (长期记忆)</text>
  <text x="120" y="248" font-size="9" fill="#374151">存储引擎: 向量数据库 (Milvus/Neo4j)</text>
  <text x="500" y="248" font-size="9" fill="#374151">内容: 用户偏好 · 历史决策 · 重要事实 · 跨会话持久化</text>

  <line x1="480" y1="270" x2="480" y2="290" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Knowledge Memory (bottom) -->
  <rect x="100" y="295" width="760" height="60" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="100" y="295" width="760" height="22" rx="8" fill="#ea580c"/>
  <rect x="100" y="305" width="760" height="12" fill="#ea580c"/>
  <text x="480" y="311" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Knowledge Memory (知识记忆)</text>
  <text x="120" y="333" font-size="9" fill="#374151">存储引擎: 知识图谱 (Neo4j) + 向量数据库 (Milvus)</text>
  <text x="500" y="333" font-size="9" fill="#374151">内容: 行业知识 · 企业 SOP · 产品文档 · 持久化结构化/非结构化知识</text>

  <!-- Retrieval Flow on right side -->
  <text x="480" y="380" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">记忆检索策略 (并行检索 → 融合排序 → 注入 Context Window)</text>

  <rect x="20" y="395" width="200" height="28" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="120" y="414" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">短期记忆 (Redis, P99&lt;2ms)</text>

  <rect x="235" y="395" width="200" height="28" rx="5" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="335" y="414" text-anchor="middle" font-size="9" font-weight="600" fill="#7c3aed">长期记忆 (Milvus, P99&lt;10ms)</text>

  <rect x="450" y="395" width="200" height="28" rx="5" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="550" y="414" text-anchor="middle" font-size="9" font-weight="600" fill="#c2410c">用户画像 (PG, P99&lt;5ms)</text>

  <rect x="665" y="395" width="200" height="28" rx="5" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="765" y="414" text-anchor="middle" font-size="9" font-weight="600" fill="#15803d">知识记忆 (RAG, P99&lt;200ms)</text>

  <!-- Merge arrows -->
  <path d="M 120 423 L 120 440 L 480 440 L 480 450" stroke="#16a34a" stroke-width="1" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 335 423 L 335 440 L 480 440" stroke="#16a34a" stroke-width="1" fill="none"/>
  <path d="M 550 423 L 550 440 L 480 440" stroke="#16a34a" stroke-width="1" fill="none"/>
  <path d="M 765 423 L 765 440 L 480 440" stroke="#16a34a" stroke-width="1" fill="none"/>

  <rect x="380" y="452" width="200" height="22" rx="5" fill="#16a34a"/>
  <text x="480" y="468" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Memory Fusion → LLM Context</text>

</svg>