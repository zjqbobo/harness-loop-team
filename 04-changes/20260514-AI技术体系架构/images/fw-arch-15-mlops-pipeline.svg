<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="108%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.06"/></filter>
  </defs>
  <style>text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }</style>
  <rect width="960" height="280" fill="#ffffff"/>
  <text x="480" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Agent MLOps 流水线 (迭代密集型)</text>

  <rect x="280" y="40" width="400" height="36" rx="6" fill="#2563eb"/>
  <text x="480" y="63" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">评估数据集 (Dataset)</text>
  <text x="480" y="38" text-anchor="middle" font-size="8" fill="#6b7280">历史真实Case(80) + 人工标注(40) + LLM生成(20) + 对抗(10)</text>

  <line x1="480" y1="76" x2="480" y2="95" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="280" y="100" width="400" height="36" rx="6" fill="#7c3aed"/>
  <text x="480" y="123" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">评估执行 (Eval Run)</text>

  <line x1="480" y1="136" x2="480" y2="155" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="280" y="160" width="400" height="36" rx="6" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="480" y="183" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">结果分析 (Analysis)</text>

  <path d="M 500 196 L 500 210 L 280 210 L 280 220" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 480 196 L 480 220" stroke="#ea580c" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 460 196 L 460 210 L 680 210 L 680 220" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)"/>

  <rect x="180" y="225" width="140" height="36" rx="6" fill="#16a34a"/>
  <text x="250" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Pass → 自动发布</text>

  <rect x="370" y="225" width="140" height="36" rx="6" fill="#ea580c"/>
  <text x="440" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Warning → 人工审核</text>

  <rect x="560" y="225" width="140" height="36" rx="6" fill="#dc2626"/>
  <text x="630" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Fail → 阻断发布</text>

</svg>