  <text x="310" y="176" text-anchor="middle" font-size="10" fill="#6b7280">预置Agent</text>
  <text x="310" y="190" text-anchor="middle" font-size="10" fill="#6b7280">合规规则库</text>
  <text x="310" y="204" text-anchor="middle" font-size="10" fill="#6b7280">连接器生态</text>

  <rect x="410" y="140" width="160" height="74" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
