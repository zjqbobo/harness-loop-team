  <rect x="30" y="700" width="900" height="40" rx="6" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="480" y="725" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">平台横切能力 Cross-Cutting: 多租户隔离 | 计费计量 | 身份认证 | 审计日志 | 配置中心 | 文档中心</text>

  <!-- Layer labels on left side -->
  <text x="20" y="165" text-anchor="middle" font-size="10" fill="#9ca3af" transform="rotate(-90, 20, 165)">行业方案</text>
  <text x="20" y="325" text-anchor="middle" font-size="10" fill="#9ca3af" transform="rotate(-90, 20, 325)">Agent引擎</text>
  <text x="20" y="485" text-anchor="middle" font-size="10" fill="#9ca3af" transform="rotate(-90, 20, 485)">AI能力</text>
  <text x="20" y="630" text-anchor="middle" font-size="10" fill="#9ca3af" transform="rotate(-90, 20, 630)">基础设施</text>

</svg>