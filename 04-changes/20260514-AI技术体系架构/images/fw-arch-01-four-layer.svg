  <rect x="30" y="50" width="900" height="36" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="480" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">开放集成与开发者体验: REST API | gRPC | WebSocket | MCP | A2A | SDK (Python/JS/Java) | CLI</text>

