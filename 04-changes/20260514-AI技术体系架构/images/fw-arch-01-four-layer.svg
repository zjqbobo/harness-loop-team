  <rect x="630" y="620" width="130" height="36" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="695" y="643" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">对象存储</text>

  <rect x="775" y="620" width="135" height="36" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="842" y="643" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">可观测性</text>

