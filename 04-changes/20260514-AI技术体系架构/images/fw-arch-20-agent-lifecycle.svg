<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="108%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.06"/></filter>
  </defs>
  <style>text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }</style>
  <rect width="960" height="400" fill="#ffffff"/>
  <text x="480" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Agent 生命周期状态机</text>

  <!-- Initial -->
  <circle cx="50" cy="195" r="8" fill="#111827"/>

  <!-- Draft -->
  <rect x="80" y="170" width="100" height="50" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="199" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Draft</text>
  <text x="130" y="213" text-anchor="middle" font-size="9" fill="#6b7280">草稿</text>
  <path d="M 58 195 L 75 195" stroke="#111827" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- Testing -->
  <rect x="240" y="100" width="100" height="50" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2" filter="url(#shadow)"/>
  <text x="290" y="129" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Testing</text>
  <text x="290" y="143" text-anchor="middle" font-size="9" fill="#6b7280">测试中</text>
  <path d="M 180 195 L 200 195 L 200 125 L 235 125" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="215" y="190" text-anchor="middle" font-size="9" fill="#6b7280">提交测试</text>

  <!-- Draft self-loop -->
  <path d="M 180 180 L 200 180 L 200 80 L 130 80 L 130 127" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3" fill="none"/>
  <text x="170" y="75" text-anchor="middle" font-size="8" fill="#9ca3af">编辑</text>

  <!-- Testing to Draft (fail) -->
  <path d="M 240 138 L 185 138 L 185 150" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-red)"/>
  <text x="215" y="133" text-anchor="middle" font-size="9" fill="#dc2626">测试不通过</text>

  <!-- Review -->
  <rect x="400" y="100" width="100" height="50" rx="10" fill="#faf5ff" stroke="#c4b5fd" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="129" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">Review</text>
  <text x="450" y="143" text-anchor="middle" font-size="9" fill="#6b7280">审核中</text>
  <path d="M 340 125 L 395 125" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="367" y="118" text-anchor="middle" font-size="9" fill="#6b7280">测试通过</text>

  <!-- Review to Draft (reject) -->
  <path d="M 400 140 L 200 140 L 200 168" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-red)"/>
  <text x="300" y="135" text-anchor="middle" font-size="9" fill="#dc2626">驳回修改</text>

  <!-- Published -->
  <rect x="400" y="230" width="100" height="50" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="259" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Published</text>
  <text x="450" y="273" text-anchor="middle" font-size="9" fill="#6b7280">已发布</text>
  <path d="M 450 150 L 450 225" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="462" y="190" text-anchor="middle" font-size="9" fill="#6b7280">审核通过</text>

  <!-- Running -->
  <rect x="560" y="230" width="100" height="50" rx="10" fill="#16a34a" filter="url(#shadow)"/>
  <text x="610" y="259" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Running</text>
  <text x="610" y="273" text-anchor="middle" font-size="9" fill="#dcfce7">运行中</text>
  <path d="M 500 255 L 555 255" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="527" y="248" text-anchor="middle" font-size="9" fill="#6b7280">部署上线</text>

  <!-- Suspended -->
  <rect x="560" y="330" width="100" height="50" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="2" filter="url(#shadow)"/>
  <text x="610" y="359" text-anchor="middle" font-size="12" font-weight="600" fill="#c2410c">Suspended</text>
  <text x="610" y="373" text-anchor="middle" font-size="9" fill="#6b7280">已暂停</text>

  <!-- Running <-> Suspended -->
  <path d="M 560 280 L 540 280 L 540 355 L 555 355" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="530" y="320" text-anchor="middle" font-size="9" fill="#6b7280">暂停</text>
  <path d="M 610 330 L 610 305 L 620 305 L 620 285" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="635" y="310" text-anchor="middle" font-size="9" fill="#6b7280">恢复</text>

  <!-- Archived -->
  <rect x="740" y="230" width="100" height="50" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="790" y="259" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Archived</text>
  <text x="790" y="273" text-anchor="middle" font-size="9" fill="#6b7280">已归档</text>
  <path d="M 660 255 L 735 255" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="697" y="248" text-anchor="middle" font-size="9" fill="#6b7280">下线</text>

  <!-- Final state -->
  <circle cx="870" cy="255" r="8" fill="#111827"/>
  <circle cx="870" cy="255" r="14" fill="none" stroke="#111827" stroke-width="2"/>
  <path d="M 840 255 L 852 255" stroke="#111827" stroke-width="2" fill="none"/>

  <!-- Legend -->
  <rect x="80" y="330" width="400" height="50" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="100" y1="345" x2="130" y2="345" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="140" y="350" font-size="10" fill="#374151">正常流转</text>
  <line x1="220" y1="345" x2="250" y2="345" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="260" y="350" font-size="10" fill="#374151">回退/驳回</text>
  <line x1="100" y1="365" x2="130" y2="365" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="140" y="370" font-size="10" fill="#374151">自循环</text>

</svg>