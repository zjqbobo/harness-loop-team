<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="108%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.06"/></filter>
  </defs>
  <style>text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }</style>
  <rect width="960" height="480" fill="#ffffff"/>
  <text x="480" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">SaaS 部署拓扑</text>

  <!-- Layer 1: Global LB -->
  <rect x="280" y="42" width="400" height="36" rx="8" fill="#1e293b" filter="url(#shadow)"/>
  <text x="480" y="65" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Global LB (DNS Geo-routing + Health Check)</text>
  <line x1="480" y1="78" x2="480" y2="100" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Layer 2: API Gateway -->
  <rect x="250" y="108" width="460" height="34" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="130" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Higress API Gateway (WAF + Rate Limit + 灰度)</text>

  <!-- 4 arrows from gateway to services -->
  <line x1="340" y1="142" x2="340" y2="170" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="440" y1="142" x2="440" y2="170" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="540" y1="142" x2="540" y2="170" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="640" y1="142" x2="640" y2="170" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Layer 3: Service Boxes (4 columns) -->
  <rect x="40" y="176" width="205" height="130" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="176" width="205" height="24" rx="8" fill="#2563eb"/>
  <rect x="40" y="188" width="205" height="12" fill="#2563eb"/>
  <text x="142" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Control Plane</text>
  <text x="60" y="218" font-size="10" fill="#374151">租户管理 · 权限 · 计费</text>
  <text x="60" y="235" font-size="10" fill="#374151">Agent 管理 · 配置中心</text>
  <text x="60" y="252" font-size="10" fill="#374151">审计日志 · Admin UI</text>
  <text x="60" y="276" font-size="9" fill="#6b7280">PostgreSQL + Redis</text>

  <rect x="260" y="176" width="205" height="130" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="260" y="176" width="205" height="24" rx="8" fill="#dc2626"/>
  <rect x="260" y="188" width="205" height="12" fill="#dc2626"/>
  <text x="362" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Agent Runtime</text>
  <text x="280" y="218" font-size="10" fill="#374151">编排引擎 (LangGraph + 自研)</text>
  <text x="280" y="235" font-size="10" fill="#374151">记忆系统 · 对话管理</text>
  <text x="280" y="252" font-size="10" fill="#374151">技能执行 · HITL 审批</text>
  <text x="280" y="276" font-size="9" fill="#6b7280">Agent Router · Eval Service</text>

  <rect x="480" y="176" width="205" height="130" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="480" y="176" width="205" height="24" rx="8" fill="#7c3aed"/>
  <rect x="480" y="188" width="205" height="12" fill="#7c3aed"/>
  <text x="582" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">AI Service</text>
  <text x="500" y="218" font-size="10" fill="#374151">模型网关 · RAG 引擎</text>
  <text x="500" y="235" font-size="10" fill="#374151">Prompt Hub · 知识图谱</text>
  <text x="500" y="252" font-size="10" fill="#374151">MLOps · 语义缓存</text>
  <text x="500" y="276" font-size="9" fill="#6b7280">LiteLLM + LlamaIndex</text>

  <rect x="700" y="176" width="220" height="130" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="700" y="176" width="220" height="24" rx="8" fill="#16a34a"/>
  <rect x="700" y="188" width="220" height="12" fill="#16a34a"/>
  <text x="810" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Infra Services</text>
  <text x="720" y="218" font-size="10" fill="#374151">Milvus (向量DB) · Neo4j (图DB)</text>
  <text x="720" y="235" font-size="10" fill="#374151">Kafka · Redis · MinIO · PG</text>
  <text x="720" y="252" font-size="10" fill="#374151">Prometheus · Grafana · Loki</text>
  <text x="720" y="276" font-size="9" fill="#6b7280">Skill · A2A · Prompt Hub PG 实例</text>

  <!-- Vertical connection: AI Service to GPU Pool -->
  <path d="M 582 306 L 582 335 L 480 335 L 480 348" stroke="#7c3aed" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="505" y="330" text-anchor="middle" font-size="8" fill="#7c3aed">推理请求</text>

  <!-- Layer 4: GPU Pool -->
  <rect x="240" y="354" width="480" height="42" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="240" y="354" width="480" height="20" rx="8" fill="#ea580c"/>
  <rect x="240" y="364" width="480" height="10" fill="#ea580c"/>
  <text x="480" y="370" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">GPU 推理集群 (独立资源池 — Node Selector 调度)</text>
  <text x="480" y="393" text-anchor="middle" font-size="10" fill="#374151">自建 GPU (A100×8 · H100×8)　|　云厂商 GPU (NVIDIA A10)　|　国产芯片 (昇腾×8 · 信创合规)</text>

  <!-- Private deployment note -->
  <rect x="100" y="415" width="760" height="32" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="480" y="435" text-anchor="middle" font-size="10" fill="#374151">私有化最小拓扑: K8s 3-Node | 64 vCPU + 256GB RAM + 1×A100 | 可对接客户 LDAP/SSO · S3/NAS · Kafka</text>

</svg>