<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="108%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.06"/></filter>
  </defs>
  <style>text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }</style>
  <rect width="960" height="520" fill="#ffffff"/>
  <text x="480" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">GPU 推理集群调度架构</text>

  <!-- Layer 1: Model Scheduler -->
  <rect x="60" y="45" width="840" height="80" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="45" width="840" height="22" rx="8" fill="#2563eb"/>
  <rect x="60" y="55" width="840" height="12" fill="#2563eb"/>
  <text x="480" y="61" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Model Scheduler (调度层)</text>
  <rect x="80" y="75" width="180" height="36" rx="5" fill="#fff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="170" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">模型冷热管理</text>
  <rect x="280" y="75" width="180" height="36" rx="5" fill="#fff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="370" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">GPU 亲和性</text>
  <rect x="480" y="75" width="180" height="36" rx="5" fill="#fff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="570" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">优先级抢占</text>
  <rect x="680" y="75" width="200" height="36" rx="5" fill="#fff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="780" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">弹性伸缩 (HPA)</text>

  <line x1="480" y1="125" x2="480" y2="150" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Layer 2: Inference Runtime -->
  <rect x="60" y="155" width="840" height="80" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="155" width="840" height="22" rx="8" fill="#16a34a"/>
  <rect x="60" y="165" width="840" height="12" fill="#16a34a"/>
  <text x="480" y="171" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">推理引擎 Runtime</text>
  <rect x="80" y="185" width="180" height="36" rx="5" fill="#fff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="170" y="208" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">vLLM (高吞吐)</text>
  <rect x="280" y="185" width="180" height="36" rx="5" fill="#fff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="370" y="208" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">TGI (Hugging Face)</text>
  <rect x="480" y="185" width="180" height="36" rx="5" fill="#fff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="570" y="208" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">Triton (NVIDIA)</text>
  <rect x="680" y="185" width="200" height="36" rx="5" fill="#fff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="780" y="208" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">自研 (特定模型)</text>

  <line x1="480" y1="235" x2="480" y2="260" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Layer 3: Physical GPU -->
  <rect x="60" y="265" width="840" height="65" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="265" width="840" height="22" rx="8" fill="#7c3aed"/>
  <rect x="60" y="275" width="840" height="12" fill="#7c3aed"/>
  <text x="480" y="281" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">物理 GPU 资源池</text>
  <rect x="80" y="295" width="220" height="24" rx="5" fill="#fff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="190" y="312" text-anchor="middle" font-size="10" fill="#7c3aed">自建集群 (A100/H100/B200)</text>
  <rect x="330" y="295" width="220" height="24" rx="5" fill="#fff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="440" y="312" text-anchor="middle" font-size="10" fill="#7c3aed">云厂商 GPU</text>
  <rect x="580" y="295" width="300" height="24" rx="5" fill="#fff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="730" y="312" text-anchor="middle" font-size="10" fill="#7c3aed">国产芯片 (昇腾/寒武纪) · 信创合规</text>

  <!-- Key design notes -->
  <text x="480" y="365" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">关键设计</text>

  <rect x="80" y="378" width="180" height="60" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="170" y="396" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">三级缓存调度</text>
  <text x="170" y="412" text-anchor="middle" font-size="9" fill="#6b7280">Hot→Warm→Cold</text>
  <text x="170" y="426" text-anchor="middle" font-size="9" fill="#6b7280">5s / 30s 加载</text>

  <rect x="280" y="378" width="180" height="60" rx="5" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="370" y="396" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">GPU 亲和性</text>
  <text x="370" y="412" text-anchor="middle" font-size="9" fill="#6b7280">复用 KV Cache</text>
  <text x="370" y="426" text-anchor="middle" font-size="9" fill="#6b7280">延迟降低 40%+</text>

  <rect x="480" y="378" width="180" height="60" rx="5" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="570" y="396" text-anchor="middle" font-size="10" font-weight="600" fill="#b91c1c">优先级抢占</text>
  <text x="570" y="412" text-anchor="middle" font-size="9" fill="#6b7280">在线推理 &gt; 离线评估</text>
  <text x="570" y="426" text-anchor="middle" font-size="9" fill="#6b7280">&gt; 模型训练</text>

  <rect x="680" y="378" width="200" height="60" rx="5" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="780" y="396" text-anchor="middle" font-size="10" font-weight="600" fill="#c2410c">异构支持</text>
  <text x="780" y="412" text-anchor="middle" font-size="9" fill="#6b7280">NVIDIA + 昇腾/寒武纪</text>
  <text x="780" y="426" text-anchor="middle" font-size="9" fill="#6b7280">Adapter 屏蔽差异</text>

</svg>