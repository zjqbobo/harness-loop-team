<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="108%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.06"/></filter>
  </defs>
  <style>text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }</style>
  <rect width="960" height="680" fill="#ffffff"/>
  <text x="480" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">请求链路全景</text>

  <!-- Top row: entry chain -->
  <rect x="30" y="48" width="120" height="44" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8">用户请求</text>
  <line x1="150" y1="70" x2="185" y2="70" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="190" y="48" width="130" height="44" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="255" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">API Gateway</text>
  <line x1="320" y1="70" x2="355" y2="70" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="360" y="48" width="130" height="44" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="425" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#7c3aed">Agent Router</text>
  <line x1="490" y1="70" x2="525" y2="70" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Orchestration Engine - center hub -->
  <rect x="530" y="40" width="180" height="58" rx="10" fill="#fef2f2" stroke="#f87171" stroke-width="2" filter="url(#shadow)"/>
  <text x="620" y="66" text-anchor="middle" font-size="13" font-weight="600" fill="#b91c1c">编排引擎</text>
  <text x="620" y="84" text-anchor="middle" font-size="10" fill="#6b7280">(LangGraph + 自研)</text>

  <!-- ====== 三条并行分支 ====== -->

  <!-- Branch 1: Skill Call (left) -->
  <path d="M 540 70 L 120 70 L 120 140" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="30" y="148" width="180" height="50" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="120" y="170" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Skill Executor</text>
  <text x="120" y="188" text-anchor="middle" font-size="9" fill="#6b7280">技能调用执行器</text>
  <text x="75" y="126" text-anchor="middle" font-size="9" fill="#16a34a">Skill Call</text>

  <rect x="30" y="215" width="180" height="42" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="120" y="234" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Skill Registry</text>
  <text x="120" y="250" text-anchor="middle" font-size="9" fill="#6b7280">MCP · A2A · API</text>
  <line x1="120" y1="198" x2="120" y2="212" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Return from Skill -->
  <path d="M 120 257 L 120 290 L 530 290 L 540 85" stroke="#16a34a" stroke-width="1" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-green)"/>
  <text x="330" y="283" text-anchor="middle" font-size="8" fill="#16a34a">结果返回</text>

  <!-- Branch 2: LLM Call (right) -->
  <path d="M 700 70 L 830 70 L 830 140" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="790" y="62" text-anchor="middle" font-size="9" fill="#7c3aed">LLM Call</text>

  <rect x="720" y="148" width="220" height="50" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="830" y="170" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">Model Gateway</text>
  <text x="830" y="188" text-anchor="middle" font-size="9" fill="#6b7280">Router · Fallback · Rate Limit</text>

  <rect x="720" y="215" width="220" height="42" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="830" y="234" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">LLM 模型池</text>
  <text x="830" y="250" text-anchor="middle" font-size="9" fill="#6b7280">Claude · DeepSeek · Qwen · 自建 vLLM</text>
  <line x1="830" y1="198" x2="830" y2="212" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Return from LLM -->
  <path d="M 830 257 L 830 290 L 700 290 L 710 85" stroke="#7c3aed" stroke-width="1" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="720" y="283" text-anchor="middle" font-size="8" fill="#7c3aed">结果返回</text>

  <!-- Branch 3: Memory Recall (center down) -->
  <path d="M 620 98 L 620 140" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="635" y="123" font-size="9" fill="#ea580c">Recall</text>

  <rect x="510" y="148" width="220" height="50" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="170" text-anchor="middle" font-size="12" font-weight="600" fill="#c2410c">Memory Store</text>
  <text x="620" y="188" text-anchor="middle" font-size="9" fill="#6b7280">分层记忆 (工作 · 短期 · 长期 · 知识)</text>

  <!-- Memory sub-components -->
  <rect x="310" y="218" width="160" height="34" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="390" y="233" text-anchor="middle" font-size="10" fill="#374151">短期记忆</text>
  <text x="390" y="247" text-anchor="middle" font-size="9" fill="#6b7280">(Redis, 当前会话)</text>

  <rect x="490" y="218" width="160" height="34" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="570" y="233" text-anchor="middle" font-size="10" fill="#374151">长期记忆</text>
  <text x="570" y="247" text-anchor="middle" font-size="9" fill="#6b7280">(Milvus, 跨会话)</text>

  <rect x="670" y="218" width="160" height="34" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="750" y="233" text-anchor="middle" font-size="10" fill="#374151">知识记忆</text>
  <text x="750" y="247" text-anchor="middle" font-size="9" fill="#6b7280">(Neo4j + MinIO S3)</text>

  <line x1="620" y1="198" x2="620" y2="215" stroke="#ea580c" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="480" y1="235" x2="487" y2="235" stroke="#ea580c" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="660" y1="235" x2="667" y2="235" stroke="#ea580c" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Return from Memory -->
  <path d="M 620 252 L 620 315 L 530 315 L 530 98" stroke="#ea580c" stroke-width="1" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-orange)"/>

  <!-- Bottom: Response output -->
  <rect x="530" y="340" width="180" height="44" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2" filter="url(#shadow)"/>
  <text x="620" y="362" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">Response</text>
  <text x="620" y="378" text-anchor="middle" font-size="10" fill="#6b7280">Skill结果 · LLM回答 · 记忆更新</text>

  <!-- Final return to user -->
  <path d="M 620 384 L 620 420 L 90 420 L 90 96" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-gray)"/>
  <text x="355" y="413" text-anchor="middle" font-size="9" fill="#6b7280">返回用户</text>

  <!-- Step labels on the right -->
  <rect x="860" y="55" width="80" height="20" rx="4" fill="#2563eb"/>
  <text x="900" y="70" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">① 路由决策</text>
  <rect x="860" y="85" width="80" height="20" rx="4" fill="#16a34a"/>
  <text x="900" y="100" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">② 技能调用</text>
  <rect x="860" y="115" width="80" height="20" rx="4" fill="#7c3aed"/>
  <text x="900" y="130" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">③ 模型调用</text>
  <rect x="860" y="145" width="80" height="20" rx="4" fill="#ea580c"/>
  <text x="900" y="160" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">④ 记忆召回</text>

  <!-- Embedding Service & Semantic Cache (extra services at bottom) -->
  <text x="480" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">附加 AI 能力服务 (Agent 推理中按需调用)</text>

  <rect x="30" y="482" width="160" height="34" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="110" y="504" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">RAG Engine</text>

  <rect x="210" y="482" width="160" height="34" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="290" y="504" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">Prompt Hub</text>

  <rect x="390" y="482" width="160" height="34" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="470" y="504" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">Semantic Cache</text>

  <rect x="570" y="482" width="160" height="34" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="650" y="504" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">Embedding Service</text>

  <rect x="750" y="482" width="160" height="34" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="830" y="504" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">A2A Registry</text>

  <!-- Legend -->
  <rect x="30" y="540" width="450" height="26" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="50" y1="553" x2="75" y2="553" stroke="#2563eb" stroke-width="2"/>
  <text x="82" y="558" font-size="10" fill="#374151">主链路 (请求→路由→编排)</text>
  <line x1="240" y1="553" x2="265" y2="553" stroke="#16a34a" stroke-width="2"/>
  <text x="272" y="558" font-size="10" fill="#374151">技能调用</text>
  <line x1="340" y1="553" x2="365" y2="553" stroke="#7c3aed" stroke-width="2"/>
  <text x="372" y="558" font-size="10" fill="#374151">模型调用</text>

  <rect x="30" y="572" width="450" height="26" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="50" y1="585" x2="75" y2="585" stroke="#ea580c" stroke-width="2"/>
  <text x="82" y="590" font-size="10" fill="#374151">记忆召回</text>
  <line x1="160" y1="585" x2="185" y2="585" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="192" y="590" font-size="10" fill="#374151">返回/回调</text>
  <line x1="280" y1="585" x2="305" y2="585" stroke="#16a34a" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="312" y="590" font-size="10" fill="#374151">异步返回</text>

</svg>