<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="108%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.06"/></filter>
  </defs>
  <style>text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }</style>
  <rect width="960" height="680" fill="#ffffff"/>
  <text x="480" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">RAG 检索增强生成流水线</text>

  <!-- Stage 0: Query -->
  <rect x="380" y="40" width="200" height="36" rx="18" fill="#2563eb"/>
  <text x="480" y="63" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Query 输入</text>

  <line x1="480" y1="76" x2="480" y2="100" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Stage 1: Query Understanding -->
  <rect x="280" y="105" width="400" height="70" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="280" y="105" width="400" height="20" rx="8" fill="#2563eb"/>
  <rect x="280" y="115" width="400" height="10" fill="#2563eb"/>
  <text x="480" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Query 理解</text>
  <text x="300" y="140" font-size="9" fill="#374151">Query Rewrite (LLM改写)</text>
  <text x="300" y="155" font-size="9" fill="#374151">Query Decompose (拆解)</text>
  <text x="640" y="140" font-size="9" fill="#374151">Intent Classify (分类)</text>
  <text x="640" y="155" font-size="9" fill="#374151">Embedding (向量化)</text>

  <line x1="480" y1="175" x2="480" y2="200" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Stage 2: Multi-Retrieval -->
  <rect x="60" y="205" width="840" height="90" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="205" width="840" height="20" rx="8" fill="#16a34a"/>
  <rect x="60" y="215" width="840" height="10" fill="#16a34a"/>
  <text x="480" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">多路召回</text>

  <rect x="80" y="235" width="180" height="45" rx="5" fill="#fff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="170" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">向量召回 (Milvus)</text>
  <text x="170" y="270" text-anchor="middle" font-size="9" fill="#6b7280">Embedding 相似检索</text>

  <rect x="280" y="235" width="180" height="45" rx="5" fill="#fff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="370" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">关键词召回 (ES)</text>
  <text x="370" y="270" text-anchor="middle" font-size="9" fill="#6b7280">BM25 精确匹配</text>

  <rect x="480" y="235" width="180" height="45" rx="5" fill="#fff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="570" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">图召回 (Neo4j)</text>
  <text x="570" y="270" text-anchor="middle" font-size="9" fill="#6b7280">知识图谱关系查询</text>

  <rect x="680" y="235" width="200" height="45" rx="5" fill="#fff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="780" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">结构化查询 (SQL生成)</text>
  <text x="780" y="270" text-anchor="middle" font-size="9" fill="#6b7280">LLM → SQL → PG</text>


  <line x1="480" y1="295" x2="480" y2="320" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Stage 3: Rerank -->
  <rect x="180" y="325" width="600" height="55" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="180" y="325" width="600" height="20" rx="8" fill="#7c3aed"/>
  <rect x="180" y="335" width="600" height="10" fill="#7c3aed"/>
  <text x="480" y="340" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">融合排序 (Rerank)</text>
  <text x="200" y="356" font-size="9" fill="#6b7280">Cross-Encoder 精排</text>
  <text x="380" y="356" font-size="9" fill="#6b7280">时效性加权</text>
  <text x="520" y="356" font-size="9" fill="#6b7280">权限过滤</text>
  <text x="650" y="356" font-size="9" fill="#6b7280">多样性去重</text>
  <text x="200" y="372" font-size="9" fill="#6b7280">Top-K 截断</text>

  <line x1="480" y1="380" x2="480" y2="405" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Stage 4: Context Assembly -->
  <rect x="280" y="410" width="400" height="40" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="280" y="410" width="400" height="18" rx="8" fill="#ea580c"/>
  <rect x="280" y="418" width="400" height="10" fill="#ea580c"/>
  <text x="480" y="423" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">上下文组装</text>
  <text x="480" y="442" text-anchor="middle" font-size="9" fill="#374151">Chunk 合并 · 引用标记 · Prompt 模板注入</text>

  <line x1="480" y1="450" x2="480" y2="475" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Stage 5: LLM -->
  <rect x="330" y="480" width="300" height="40" rx="20" fill="#dc2626"/>
  <text x="480" y="505" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">LLM 生成回答</text>

  <line x1="480" y1="520" x2="480" y2="540" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="380" y="545" width="200" height="32" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="480" y="566" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">Response + 引用来源</text>

  <!-- Chunk strategy table at bottom -->
  <text x="480" y="608" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">分块策略矩阵</text>

  <rect x="60" y="618" width="840" height="50" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="90" y="636" font-size="9" font-weight="600" fill="#374151">技术文档</text><text x="190" y="636" font-size="9" fill="#6b7280">按标题层级 | 512t</text>
  <text x="340" y="636" font-size="9" font-weight="600" fill="#374151">法律合同</text><text x="440" y="636" font-size="9" fill="#6b7280">按条款 | 1024t</text>
  <text x="540" y="636" font-size="9" font-weight="600" fill="#374151">表格数据</text><text x="640" y="636" font-size="9" fill="#6b7280">按行+上下文</text>
  <text x="740" y="636" font-size="9" font-weight="600" fill="#374151">代码</text><text x="800" y="636" font-size="9" fill="#6b7280">AST切分</text>
  <text x="90" y="656" font-size="9" font-weight="600" fill="#374151">对话记录</text><text x="190" y="656" font-size="9" fill="#6b7280">按轮次 | 前1轮</text>

</svg>